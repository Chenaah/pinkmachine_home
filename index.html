<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Pink Machine</title>
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-W9V03CRZZ1"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag() { dataLayer.push(arguments); }
    gtag('js', new Date());
    gtag('config', 'G-W9V03CRZZ1');
  </script>
  <style>
    :root {
      --bg: #fff6fb;
      --text: #2b1d24;
      --muted: #7b6670;
      --accent: #d84d8f;
      --card: rgba(255, 255, 255, 0.82);
      --border: rgba(216, 77, 143, 0.18);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: Georgia, "Times New Roman", serif;
      color: var(--text);
      background:
        radial-gradient(circle at top, rgba(255, 176, 211, 0.45), transparent 35%),
        linear-gradient(180deg, #fff9fc 0%, var(--bg) 100%);
    }

    main {
      width: min(680px, 100%);
      padding: 40px 28px;
      text-align: center;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 28px;
      box-shadow: 0 20px 50px rgba(131, 83, 108, 0.12);
      backdrop-filter: blur(8px);
    }

    img {
      display: block;
      width: min(260px, 70vw);
      height: auto;
      margin: 0 auto 28px;
    }

    p {
      margin: 0;
      font-size: clamp(1.1rem, 2vw, 1.3rem);
      line-height: 1.7;
    }

    a {
      color: var(--accent);
      text-decoration-thickness: 2px;
      text-underline-offset: 0.14em;
    }

    small {
      display: block;
      margin-top: 18px;
      font-size: 0.92rem;
      line-height: 1.6;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <main>
    <img src="pinkmachine.png" alt="Pink Machine">
    <p>
      Homepage is coming soon. This is a place
      <a href="https://chenyu.dev/">Chen Yu</a>
      will put fun things on when he gets tired of doing research.
    </p>
    <small>
      Sometimes, doing research is like building a pink machine. Cool, but who cares.
    </small>
  </main>
</body>
</html>
